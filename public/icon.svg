<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="line-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="dot-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#99f6e4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0f172a"/>

  <!-- Subtle inner glow on background -->
  <rect width="100" height="100" rx="20" fill="url(#line-grad)" opacity="0.04"/>

  <!-- Chart trend line: rises, dips slightly, then spikes — classic market shape -->
  <polyline
    points="13,77 33,54 53,63 81,21"
    fill="none"
    stroke="url(#line-grad)"
    stroke-width="12.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Peak focal point — the "sight" -->
  <circle cx="81" cy="21" r="10.5" fill="url(#dot-grad)"/>
</svg>
