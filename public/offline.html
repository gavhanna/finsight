<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinSight — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background-color: #0f172a;
      color: #e2e8f0;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      text-align: center;
    }

    .icon-wrap {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: rgba(20, 184, 166, 0.15);
      border: 1px solid rgba(20, 184, 166, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    svg { color: #14b8a6; }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #f1f5f9;
    }

    p {
      font-size: 0.9375rem;
      color: #94a3b8;
      max-width: 320px;
      line-height: 1.6;
    }

    .hint {
      font-size: 0.8125rem;
      color: #475569;
      margin-top: 0.25rem;
    }

    button {
      margin-top: 0.5rem;
      padding: 0.625rem 1.5rem;
      border-radius: 8px;
      border: none;
      background: #14b8a6;
      color: #0f172a;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #0d9488; }
  </style>
</head>
<body>
  <div class="icon-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
  </div>

  <div>
    <h1>You're offline</h1>
    <p>FinSight can't reach the server right now.</p>
    <p class="hint">Pages you've visited before are still available — try navigating to them.</p>
  </div>

  <button onclick="location.reload()">Try again</button>
</body>
</html>
